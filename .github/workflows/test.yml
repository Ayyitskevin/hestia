name: ci-smoke

on:
  # Pull-request branches run below; keep push scoped to main to avoid duplicate full-suite runs.
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install --require-hashes -r requirements/dev.lock
          pip install --no-deps --no-build-isolation -e .

      - name: Verify dependency locks
        run: bash scripts/lock-dependencies.sh --check

      - name: Audit locked runtime and compatibility dependencies
        timeout-minutes: 3
        run: |
          for attempt in 1 2 3; do
            if python -m pip_audit \
              --vulnerability-service=pypi \
              --strict \
              --require-hashes \
              --disable-pip \
              --progress-spinner=off \
              --timeout=30 \
              --requirement requirements/runtime.lock \
              --requirement requirements/pillow-compat.lock
            then
              exit 0
            else
              status=$?
            fi

            if [[ "$attempt" -eq 3 ]]; then
              exit "$status"
            fi

            echo "::warning::Blocking dependency audit returned nonzero (attempt ${attempt}/3); retrying."
            sleep "$((attempt * 5))"
          done

      - name: Enforce aggregate revenue-spine coverage floor
        run: bash scripts/coverage.sh

      - name: Build and boot installed wheel
        run: bash scripts/wheel-smoke.sh

      - name: Build and boot production container
        run: bash scripts/container-smoke.sh

      - name: Lint + tests + runtime invariants + dogfood
        run: bash scripts/ci-smoke.sh

      - name: Scratch backup and restore drill
        run: bash scripts/restore-drill.sh

      # Developer tooling is not part of the production image, so findings stay visible
      # without blocking application delivery. Runtime and compatibility locks are enforced above.
      - name: Audit locked development dependencies (advisory)
        continue-on-error: true
        timeout-minutes: 2
        run: |
          python -m pip_audit \
            --vulnerability-service=pypi \
            --strict \
            --require-hashes \
            --disable-pip \
            --progress-spinner=off \
            --timeout=30 \
            --requirement requirements/dev.lock

      # Run last because this reinstalls the exact supported floor, which may
      # differ from the current development pin after a future lock upgrade.
      - name: Test Pillow 12.3 floor compatibility
        run: |
          python -m pip install \
            --require-hashes \
            --only-binary=:all: \
            --no-deps \
            --force-reinstall \
            -r requirements/pillow-compat.lock
          python -m pip check
          python - <<'PY'
          from pathlib import Path
          import tomllib

          from PIL import Image, __version__

          compat_pins = [
              line
              for line in Path("requirements/pillow-compat.in").read_text().splitlines()
              if line and not line.startswith("#")
          ]
          assert compat_pins == [f"Pillow=={__version__}"], compat_pins

          project = tomllib.loads(Path("pyproject.toml").read_text())
          floor = ".".join(__version__.split(".")[:2])
          for extra in ("vision", "dev"):
              requirements = project["project"]["optional-dependencies"][extra]
              assert f"Pillow>={floor}" in requirements, (extra, requirements)

          assert hasattr(Image.new("L", (1, 1)), "get_flattened_data")
          PY
          python -m pytest -q \
            tests/test_perceptual_duplicates.py \
            tests/test_media_delivery.py
