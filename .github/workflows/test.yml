name: ci-smoke

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint + tests + healthz boot
        run: bash scripts/ci-smoke.sh

      - name: Dogfood the magic moment (mock vision, no fleet)
        run: bash scripts/dogfood-hestia.sh
