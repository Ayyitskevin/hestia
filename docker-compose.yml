services:
  hestia:
    build: .
    env_file: .env
    environment:
      HESTIA_DATA_DIR: /data
      HESTIA_MEDIA_DIR: /data/media
      # The app sits behind exactly one reverse proxy (Caddy), so the real client IP is
      # the last X-Forwarded-For hop. Tells the rate limiter to trust one hop deep.
      HESTIA_TRUSTED_PROXIES: "1"
    volumes:
      - hestia-data:/data
    restart: unless-stopped

  # Daily online backup of the SQLite database onto the same volume, no host
  # cron needed. A failed backup exits the loop and crash-loops the container,
  # so `docker compose ps` shows red instead of backups silently rotting.
  backup:
    build: .
    environment:
      HESTIA_DATA_DIR: /data
      HESTIA_BACKUP_KEEP: ${HESTIA_BACKUP_KEEP:-14}
    volumes:
      - hestia-data:/data
    entrypoint: ["bash", "-c", "while true; do bash /app/scripts/backup.sh || exit 1; sleep 86400; done"]
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - hestia
    environment:
      HESTIA_DOMAIN: ${HESTIA_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  hestia-data:
  caddy-data:
  caddy-config:
