<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Canceled — {{ tenant.name }}</title>
  <link rel="stylesheet" href="/static/hestia.css">
</head>
<body class="client">
  <header class="client-header">
    <div class="wrap">
      <div class="eyebrow">{{ tenant.name }}</div>
      <h1>{{ appt.title }}</h1>
    </div>
  </header>
  <main>
    <div class="wrap narrow" style="padding-top:32px">
      <div class="card stack">
        <div class="alert ok">Your session has been canceled.</div>
        <p class="muted">Thanks for letting us know — {{ tenant.name }} has been notified, and that
          time is open again. If you'd like to rebook, just reach out and we'll send a fresh link.</p>
      </div>
    </div>
  </main>
  <footer class="site-footer"><div class="wrap">Scheduled with 🔥 by {{ tenant.name }} on Hestia</div></footer>
</body>
</html>
