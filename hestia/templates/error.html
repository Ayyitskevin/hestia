<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} — Hestia</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/static/hestia.css">
</head>
<body class="client">
  <main>
    <div class="wrap narrow" style="text-align:center; padding-top:80px">
      <div class="dot ember" style="width:14px; height:14px; margin:0 auto 22px"></div>
      <h1>{{ title }}</h1>
      <p class="muted">{{ message }}</p>
      <p style="margin-top:26px">
        <a class="btn" href="{{ home_url }}">{{ home_label }}</a>
      </p>
    </div>
  </main>
</body>
</html>
